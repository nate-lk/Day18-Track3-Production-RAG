services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped

    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC

    volumes:
      - qdrant_storage:/qdrant/storage

    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}

volumes:
  qdrant_storage:
